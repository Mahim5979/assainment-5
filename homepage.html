    <title>Home Page</title>

    <!-- icon -->

    <!-- font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <style>
        *{font-family: "Inter", sans-serif;
        }

    
    </style>

</head>
<body >

    <header>
        <div class="navbar bg-base-100 shadow-sm flex-col md:flex-row justify-between px-20 rounded-lg">
            <div class="nav-logo flex items-center gap-1">
                <img class="h-9 w-9" src="images/github-logo.png" alt="">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>

            </div>
  
            <div class="flex gap-4">
                <button class="btn btn-ghost btn-circle avatar"><i class="fa-solid fa-magnifying-glass"></i></button>
                <input type="text" placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
    
            </div>
        </div>

    </header>

    <section class="max-w-[1110px] mx-auto bg-base-300 mt-16 py-5 px-6 space-x-2 rounded-lg shadow-md" >
        <button onclick="switchBtn(`all`)" id="btn-all" class=" btn h-10 w-28">all</button>
        <button onclick="switchBtn(`open`)" id="btn-open"  class="btn h-10 w-28">Open</button>
        <button onclick="switchBtn(`close`)" id="btn-close" class="btn h-10 w-28">Closed</button>
    </section>

    <section class="max-w-[1110px] mx-auto bg-base-300 mt-2 py-3 px-6 space-x-2 relative rounded-lg shadow-md">  
        <div class="flex">
            <img class="h-12 w-12 border-6 border-[#b092f5b2] rounded-full mr-2" src="images/Aperture.png" alt="">
            <div class="">
                <h2 class="text-xl font-bold"> <span id="issue-count">50</span> Issues  </h2>
                <p class="text-[#64748B]"> Track and manage your project issues</p>
            </div> 
        </div>

        <div class="flex gap-15  md:absolute top-11 right-20">
            <p class="border-l-8 border-[#00A96E] h-2 w-2 rounded-full ">Open</p>
            <p class="border-l-8 border-[#A855F7] h-2 w-2 rounded-full ">Closed</p>
        </div>
   

    </section>


    <section id="issue-container" class=" hidden max-w-[1110px] mx-auto bg-base-200 grid grid-cols-2 md:grid-cols-3 gap-4 mt-3 rounded-lg shadow-md">


    </section>


    <section id="open-issue-container" class="hidden max-w-[1110px] mx-auto bg-base-200 grid grid-cols-2 md:grid-cols-3 gap-4 mt-3 rounded-lg shadow-md">

        Open Issues Container
    </section>

    <section id="close-issue-container" class="hidden max-w-[1110px] mx-auto bg-base-200 grid grid-cols-2 md:grid-cols-3 gap-4 mt-3 rounded-lg shadow-md">

        Close Issues Container
    </section>
