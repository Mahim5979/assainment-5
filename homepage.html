<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 

     <!-- tailwind & DaisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="shortcut icon" href="./images/fav icon.jpg" type="image/x-icon">

    <style>
        *{font-family: "Inter", sans-serif;
        }

    
    </style>

</head>

<body class="bg-base-100">
    <header>
        <div class="navbar bg-base-200 shadow-md flex flex-col gap-4 md:flex-row justify-between px-20">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img src="./images/github-logo.png" alt="" height="30" width="30"> GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                 <button class="btn btn-primary btn-outline btn-circle avatar" id='btn-search'><i class="fa-solid fa-magnifying-glass"></i></button>
                <input type="text" placeholder="Search Issues..." id='search-input' class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <button class="btn btn-primary font-bold" id='btn-new-issue'><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>

    <section class="max-w-[1110px] mx-auto bg-base-200 shadow-md my-5 space-x-2.5 p-3 mt-6 rounded-lg">
        <button id="btn-all" onclick="switchBtn('all')" class="btn h-10 w-28">all</button>
        <button id="btn-open" onclick="switchBtn('open')" class="btn h-10 w-28">Open</button>
        <button id="btn-close" onclick="switchBtn('close')" class="btn h-10 w-28">Closed</button>
    </section>

    <section class="max-w-[1110px] mx-auto bg-base-200 shadow-md my-5 space-x-2.5 p-3 mt-7 rounded-lg">
        <div class="flex justify-between">
            <div class="flex gap-2 items-center">
                <div><img src="./images/Aperture.png" alt="" class="bg-gray-100 rounded-full p-2 h-12 w-12"></div>
                <div>
                    <p><span id="issue-count" class="font-bold text-xl">0</span><span class="font-bold text-xl"> Issues</span></p>
                    <h3 class="text-[#64748B]">Track and manage your project issues</h3>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <p class="flex items-center gap-1"><span class="inline-block bg-[#00A96E] p-2 rounded-full "></span> Open</p>
                <p class="flex items-center gap-1"><span class="inline-block bg-[#A855F7] p-2 rounded-full "></span> Closed</p>
            </div>
        </div>
    </section>

    <section id="issue-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-3 max-w-[1110px] mx-auto bg-base-200 mb-5">
        </section>

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box rounded-2xl p-6 flex flex-col gap-4">
            <h2 id="modal-title" class="text-2xl font-bold"></h2>
            <div class="flex items-center gap-2 text-sm text-gray-500 flex-wrap">
                <span id="modal-status-badge" class="bg-green-500 text-white rounded-full px-3 py-1 text-sm font-bold"></span>
                <span>•</span>
                <span id="modal-author"></span>
                <span>•</span>
                <span id="modal-date"></span>
            </div>
            <div id="modal-labels" class="flex gap-2 flex-wrap"></div>
            <p id="modal-description" class="text-sm text-gray-500"></p>
            <div class="bg-gray-50 rounded-xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-400">Assignee:</p>
                    <p id="modal-assignee" class="font-bold text-sm"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Priority:</p>
                    <span id="modal-priority" class="bg-red-500 text-white text-xs font-bold rounded-full px-5 py-2"></span>
                </div>
            </div>
            <div class="modal-action mt-0">
                <form method="dialog">
                    <button class="btn bg-purple-600 text-white border-none rounded-xl px-6">Close</button>
                </form>
            </div>
        </div>
    </dialog>




    <script src="script/home.js"></script>
</body>
</html>
