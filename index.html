<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 

     <!-- tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="shortcut icon" href="./images/fav icon.jpg" type="image/x-icon">


    <style>
        *{font-family: "Inter", sans-serif;
        }
    </style>
</head>
<body class="bg-base-300">
    <header class="min-h-screen max-w-md mx-auto bg-base-100 ">
       <div class="logo mx-auto pt-32">
        <img class="mx-auto mb-12" src="images/github-logo.png" alt="">
        <p class="text-[#64748B] text-center"> Sign in to manage your issues</p>
       </div>

       <div class="form">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto shadow-2xl mt-6">
            <div class="card-body">
                <fieldset class="fieldset">
                <label class="label">Username</label>
                <input id="input-name" type="text" class="input" placeholder="Enter Username" />
                <label class="label">Password</label>
                <input id="input-pass" type="password" class="input"    placeholder="Password" />
                <div><a class="link link-hover">Forgot password?</a></div>
                 <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>
    </div>
       </div>
        
    </header>



    <script src="script/login.js"></script>
</body>
</html>
